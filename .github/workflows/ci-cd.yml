name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  JAVA_VERSION: '21'
  NODE_VERSION: '22'

jobs:
  # ---------------------------------------------------------------------------
  # TEST BACKEND
  # ---------------------------------------------------------------------------
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Run backend tests
        run: ./gradlew test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: build/reports/tests/test/

  # ---------------------------------------------------------------------------
  # TEST FRONTEND
  # ---------------------------------------------------------------------------
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

  # ---------------------------------------------------------------------------
  # DEPLOY BACKEND → EC2 Spot Instance
  # ---------------------------------------------------------------------------
  deploy-backend:
    name: Deploy Backend to EC2
    needs: test-backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Build JAR
        run: ./gradlew bootJar -x test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch secrets from SSM Parameter Store
        id: ssm
        run: |
          MONGODB_URI=$(aws ssm get-parameter \
            --name "${{ secrets.SSM_MONGODB_URI_PATH }}" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text)
          echo "::add-mask::$MONGODB_URI"
          echo "MONGODB_URI=$MONGODB_URI" >> $GITHUB_OUTPUT

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy JAR to EC2
        run: |
          scp -i ~/.ssh/deploy_key \
            build/libs/*-SNAPSHOT.jar \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/customer-app/app.jar

      - name: Copy systemd service file
        run: |
          scp -i ~/.ssh/deploy_key \
            scripts/customer-app.service \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/customer-app/customer-app.service

      - name: Write .env file and restart service
        env:
          MONGODB_URI: ${{ steps.ssm.outputs.MONGODB_URI }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "bash -s" << 'EOF'
            # Write environment file (never logged)
            cat > /opt/customer-app/.env << ENVFILE
          MONGODB_URI=$MONGODB_URI
          CORS_ALLOWED_ORIGINS=${{ vars.CORS_ALLOWED_ORIGINS }}
          ENVFILE
            chmod 600 /opt/customer-app/.env

            # Install/refresh systemd unit
            sudo cp /opt/customer-app/customer-app.service /etc/systemd/system/customer-app.service
            sudo systemctl daemon-reload
            sudo systemctl restart customer-app
            sudo systemctl status customer-app --no-pager
          EOF

  # ---------------------------------------------------------------------------
  # DEPLOY FRONTEND → S3 + CloudFront
  # ---------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend to S3
    needs: test-frontend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync build to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"

          # index.html: no cache so users always get the latest version
          aws s3 cp frontend/dist/index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        if: vars.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

