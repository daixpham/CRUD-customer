server.port=8080
spring.mongodb.uri=${MONGODB_URI}
spring.mongodb.database=customer

spring.data.mongodb.auto-index-creation=true

# Togglz
togglz.enabled=true
togglz.feature-enums=org.example.config.CustomerFeatures
togglz.console.enabled=true
togglz.console.secured=false
togglz.console.path=/togglz-console

# Exclude Togglz actuator endpoint (incompatible with Spring Boot 4.x)
spring.autoconfigure.exclude=org.togglz.spring.boot.actuate.autoconfigure.TogglzEndpointAutoConfiguration

