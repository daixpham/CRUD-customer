services:
  - type: web
    name: customer-app-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: frankfurt          # EU region – choose the one closest to your users
    plan: free                 # upgrade to "starter" or higher for production
    branch: main
    autoDeploy: false          # deployments are triggered by the GitHub Actions pipeline

    # Runtime environment variables
    envVars:
      # ── Secret: set this once in the Render dashboard ─────────────────────
      - key: MONGODB_URI
        sync: false            # "sync: false" = Render asks you to enter the value
                               # manually; it is never written to this YAML file

      # ── Non-secret: can be set here or overridden in the dashboard ─────────
      - key: CORS_ALLOWED_ORIGINS
        sync: false            # e.g. https://your-bucket.s3-website.eu-central-1.amazonaws.com

      # Render exposes the service on the PORT it sets; Spring Boot reads it
      - key: SERVER_PORT
        fromService:
          name: customer-app-backend
          type: web
          property: port

    healthCheckPath: /actuator/health

